services:
  ecourts-mcp:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - ECOURTS_API_TOKEN=${ECOURTS_API_TOKEN:?Set ECOURTS_API_TOKEN in .env or environment}
      - TRANSPORT=http
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
